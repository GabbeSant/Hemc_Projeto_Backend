<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hemec | Manutenção Corretiva</title>
    <link rel="stylesheet" href="/css/manutencao-corretiva.css" />
    <link rel="shortcut icon" href="../Images/favicon.ico" type="image/x-icon">
  </head>
  <body>
    <aside class="sidebar">
      <img src="/images/logo.png" class="logo" alt="logo" />
      <hr />
      <nav class="menu-section">
        <span>PRINCIPAL</span>
        <a href="/pages/dashboard.html" class="nav-dashboard">
          <img src="/images/icone-1.png" alt="ICONE DASHBOARD" />
          <span>Dashboard</span>
        </a>
        <a href="/pages/equipamentos.html" class="nav-equipamentos">
          <img src="/images/icone-2.png" alt="ICONE EQUIPAMENTOS" />
          <span>Equipamentos</span>
        </a>
      </nav>
      <nav class="menu-section">
        <span>MANUTENÇÃO</span>
        <a href="/pages/ordens-servico.html" class="nav-ordens-servico">
          <img src="/images/icone-3.png" alt="ICONE ORDENS DE SERVIÇO" />
          <span>Ordens de Serviço</span>
        </a>
        <a href="/pages/manutencao-preventiva.html" class="nav-manut-prev">
          <img src="/images/icone-4.png" alt="ICONE MANUTENÇÃO PREVENTIVA" />
          <span>Manutenção Preventiva</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/pages/perfil.html" class="nav-perfil">
          <div class="avatar">
            <img src="/images/icone-5.png" alt="Avatar" />
            <span class="nome-paciente" id="nome-usuario">Carregando...</span>
          </div>
        </a>
        <a href="#" class="bt-navegacao" onclick="fazerLogout(event)">
          <img src="/images/icone-6.png" alt="IMAGEM DE SAIR" />
        </a>
      </div>
    </aside>

    <div class="conteudo-principal">
      <div class="main-top">
        <span>Manutenção Corretiva</span>
        <a href="/pages/ordens-servico.html" class="bt-novo-equipamento">Voltar</a>
      </div>

      <form class="conteiner-manutencao" id="form-corretiva">
        <div class="info-os">
          <span class="os-badge" id="os-numero">#OS-0000</span>
          <span id="os-equipamento">Equipamento</span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>TÉCNICO RESPONSÁVEL</label>
            <select id="responsavel" class="select-custom" required>
              <option value="">Selecione o técnico</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>DESCRIÇÃO DO REPARO REALIZADO</label>
          <textarea id="descricao-reparo" class="textarea-problema"
            placeholder="Descreva os serviços realizados"></textarea>
        </div>

        <div class="form-group">
          <label>TESTES FINAIS</label>
          <textarea id="testes-finais" class="textarea-problema"
            placeholder="Descreva os testes realizados após o reparo"></textarea>
        </div>

        <div class="form-group">
          <label>STATUS DO EQUIPAMENTO APÓS REPARO</label>
          <select id="status-resultante" class="select-custom" required>
            <option value="em_funcionamento">Em funcionamento</option>
            <option value="aguardando_reparo">Aguardando reparo adicional</option>
            <option value="fora_de_operacao">Fora de operação</option>
          </select>
        </div>

        <div class="form-group">
          <label>PEÇAS SUBSTITUÍDAS (opcional)</label>
          <div id="lista-pecas"></div>
          <button type="button" class="btn-add-peca" id="btn-add-peca">+ Adicionar Peça</button>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-registrar">Registrar Manutenção</button>
          <a href="/pages/ordens-servico.html" class="btn-cancelar">Cancelar</a>
        </div>
      </form>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/manutencao-corretiva.js"></script>
  </body>
</html>
