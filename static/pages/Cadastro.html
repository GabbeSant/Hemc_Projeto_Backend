<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inder&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/Cadastro.css">
    <title>Hemec | Cadastro</title>
</head>
<body>
    <header class="navbar">
        <div class="navbar-logo">
            <img src="/Images/logo/Group 32.png" alt="logo Hemec">
        </div>
        <nav class="navbar-nav">
            <a href="/">Início</a>
            <a href="/pages/Funcionalidades.html">Funcionalidades</a>
        </nav>
        <a href="/pages/login.html" class="btn-entrar">Entrar no Sistema</a>
    </header>

    <main class="main-content">
        <div class="panel-image">
            <img src="/Images/WhatsApp Image 2026-04-16 at 15.56.33 1.png" alt="Equipamento hospitalar">
        </div>

        <div class="panel-form">
            <div class="cadastro-card">
                <div class="cadastro-card-header">
                    <img src="/Images/mdi_person-circle.png" alt="Usuário">
                    <h2>Cadastro de usuário</h2>
                    <p>Preencha os campos a seguir para criar sua conta</p>
                </div>

                <form>
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <div class="input-wrapper">
                            <img src="/Images/material-symbols_person-outline.png" alt="">
                            <input type="text" placeholder="Seu nome completo">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>E-mail</label>
                        <div class="input-wrapper">
                            <img src="/Images/Vector.png" alt="">
                            <input type="email" placeholder="seu@email.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Senha</label>
                        <div class="input-wrapper">
                            <img src="/Images/carbon_locked.png" alt="">
                            <input type="password" placeholder="Crie uma senha">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirme sua senha</label>
                        <div class="input-wrapper">
                            <img src="/Images/carbon_locked.png" alt="">
                            <input type="password" placeholder="Confirme sua senha">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Perfil</label>
                        <div class="input-wrapper">
                            <img src="/Images/f7_person-2.png" alt="">
                            <select>
                                <option>Selecione o perfil</option>
                                <option>Eng. Biomédico</option>
                                <option>Técnico</option>
                                <option>Gestor</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Hospital</label>
                        <div class="input-wrapper">
                            <img src="/Images/boxicons_hospital.png" alt="">
                            <input type="text" placeholder="Nome do hospital">
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">
                        <img src="/Images/Vector2.png" alt="">
                        Criar conta
                    </button>
                </form>

                <div class="divider">
                    <hr>
                    <span>Ou</span>
                    <hr>
                </div>

                <div class="form-footer">
                    <p>Já possui uma conta?</p>
                    <a href="/pages/login.html">Entrar</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
