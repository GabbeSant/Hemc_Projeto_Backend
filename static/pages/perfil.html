<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemec | Perfil</title>
    <link rel="stylesheet" href="/css/perfil.css">
</head>
<body>
    <!-- MENU LATERAL -->
    <aside class="sidebar">
        <img src="/images-DEV-EV/logo.png" class="logo" alt="logo" />
        <hr>

        <nav class="menu-section">
            <span>PRINCIPAL</span>
            <a href="/pages/dashboard.html">
                <img src="/images-DEV-EV/icone-1.png" alt="ICONE DASHBOARD" />
                <span>Dashboard</span>
            </a>
            <a href="/pages/equipamentos.html">
                <img src="/images-DEV-EV/icone-2.png" alt="ICONE EQUIPAMENTOS" />
                <span>Equipamentos</span>
            </a>
        </nav>

        <nav class="menu-section">
            <span>MANUTENÇÃO</span>
            <a href="/pages/ordens-servico.html">
                <img src="/images-DEV-EV/icone-3.png" alt="ICONE ORDENS DE SERVIÇO" />
                <span>Ordens de Serviço</span>
            </a>
            <a href="/pages/manutencao-preventiva.html">
                <img src="/images-DEV-EV/icone-4.png" alt="ICONE MANUTENÇÃO PREVENTIVA" />
                <span>Manutenção Preventiva</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/pages/perfil.html" class="nav-perfil">
                <div class="avatar">
                    <img src="/images-DEV-EV/icone-5.png" alt="Avatar" />
                    <span id="sidebar-nome" class="nome-paciente">...</span>
                </div>
            </a>
            <a href="#" class="bt-navegacao" onclick="fazerLogout(event)">
                <img src="/images-DEV-EV/icone-6.png" alt="Sair" />
            </a>
        </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo-principal">
        <div class="main-top">
            <span>Perfil do Usuário</span>
        </div>

        <div class="perfil-container">

            <!-- Card principal -->
            <div class="perfil-card">
                <div class="perfil-avatar">
                    <span id="perfil-iniciais">--</span>
                </div>
                <h2 id="perfil-nome" class="perfil-nome">Carregando...</h2>
                <span id="perfil-badge" class="perfil-badge">--</span>
            </div>

            <!-- Card de detalhes -->
            <div class="perfil-detalhes">
                <h3 class="detalhes-titulo">Informações do Usuário</h3>

                <div class="detalhe-item">
                    <span class="detalhe-label">Nome completo</span>
                    <span id="detalhe-nome" class="detalhe-valor">--</span>
                </div>
                <div class="detalhe-item">
                    <span class="detalhe-label">Perfil de acesso</span>
                    <span id="detalhe-perfil" class="detalhe-valor">--</span>
                </div>
                <div class="detalhe-item">
                    <span class="detalhe-label">Setor</span>
                    <span id="detalhe-setor" class="detalhe-valor">--</span>
                </div>
                <div class="detalhe-item">
                    <span class="detalhe-label">ID do usuário</span>
                    <span id="detalhe-id" class="detalhe-valor">--</span>
                </div>
            </div>

        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/perfil.js"></script>
</body>
</html>
