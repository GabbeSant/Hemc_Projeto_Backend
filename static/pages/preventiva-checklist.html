<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemec | Checklist Preventiva</title>
    <!-- Reutiliza o CSS da manutenção preventiva (sem duplicação) -->
    <link rel="stylesheet" href="/css/manutencao-preventiva.css">
    <link rel="shortcut icon" href="../Images/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- MENU LATERAL -->
    <aside class="sidebar">
        <!-- Logo -->
        <img src="/images/logo.png" class="logo" alt="logo" />
        <hr>
  
        <!-- Menu Principal -->
        <nav class="menu-section">
          <span>PRINCIPAL</span>
  
          <a href="/pages/dashboard.html" class="nav-dashboard">
            <img src="/images/icone-1.png" alt="ICONE DASHBOARD" />
            <span>Dashboard</span>
          </a>
  
          <a href="/pages/equipamentos.html" class="nav-equipamentos">
            <img src="/images/icone-2.png" alt="ICONE EQUIPAMENTOS" />
            <span>Equipamentos</span>
          </a>
        </nav>
  
        <!-- Menu Manutenção -->
        <nav class="menu-section" class="nav-manutencao">
          <span>MANUTENÇÃO</span>
  
          <a href="#" class="nav-ordens-servico">
            <img src="/images/icone-3.png" alt="ICONE ORDENS DE SERVIÇO" />
            <span>Ordens de Serviço</span>
          </a>
  
          <a href="/pages/manutencao-preventiva.html" class="nav-manut-prev">
            <img src="/images/icone-4.png" alt="ICONE MANUTENÇÃO PREVENTIVA" />
            <span>Manutenção Preventiva</span>
          </a>
        </nav>
  
        <!-- Footer do Usuário -->
        <div class="sidebar-footer">
          <a href="/pages/perfil.html" class="nav-perfil">
            <div class="avatar">
              <img src="/images/icone-5.png" alt="Avatar" />
              <span class="nome-paciente" id="nome-usuario">Carregando...</span>
            </div>
          </a>
          <a href="#" class="bt-navegacao" onclick="fazerLogout(event)">
            <img src="/images/icone-6.png" alt="IMAGEM DE SAIR" />
          </a>
        </div>
      </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <!-- Mesmos IDs do manutencao-preventiva.html para reutilizar o JS -->
    <div class="conteudo-principal">
        <div class="main-top">
            <span>Checklist de Manutenção Preventiva</span>
            <a href="/pages/equipamentos.html" class="bt-novo-equipamento">Voltar</a>
        </div>

        <form class="conteiner-manutencao" id="form-preventiva">
            <div class="info-os" id="info-os">
                <span class="os-badge" id="os-numero">#OS-0000</span>
                <span id="os-equipamento">Equipamento</span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>TÉCNICO RESPONSÁVEL</label>
                    <select id="responsavel" class="select-custom" required>
                        <option value="">Selecione o técnico</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>DATA DE EXECUÇÃO</label>
                    <input type="date" id="data-execucao" class="select-custom" required />
                </div>
            </div>

            <div class="form-group">
                <label>HOUVE SUBSTITUIÇÃO DE PEÇAS?</label>
                <div class="radio-group">
                    <label><input type="radio" name="substituicao" value="sim" /> Sim</label>
                    <label><input type="radio" name="substituicao" value="nao" checked /> Não</label>
                </div>
            </div>

            <div class="form-group" id="secao-pecas" style="display:none">
                <label>PEÇAS SUBSTITUÍDAS</label>
                <div id="lista-pecas"></div>
                <button type="button" class="btn-add-peca" id="btn-add-peca">+ Adicionar Peça</button>
            </div>

            <div class="form-group">
                <label>CHECKLIST DE VERIFICAÇÃO</label>
                <div id="checklist-itens" class="checklist-container"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-registrar">Registrar Manutenção</button>
                <a href="/pages/ordens-servico.html" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>

    <!--
        Pré-script: resolve ?eq=ID para ?os=ID antes do DOMContentLoaded disparar.
        Usa XHR síncrono (aceitável aqui pois é uma chamada local de inicialização).
        O manutencao-preventiva.js é então carregado sem modificação — sem duplicação.
    -->
    <script>
    (function () {
        var p = new URLSearchParams(window.location.search);
        if (p.has('os') || !p.has('eq')) return; // já tem OS ou sem parâmetro — deixa o JS principal agir

        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/api/ordens-servico/', false); // síncrono intencional
        xhr.send();
        if (xhr.status !== 200) return;

        var eqId   = parseInt(p.get('eq'));
        var ordens = JSON.parse(xhr.responseText);
        var os     = ordens.find(function (o) {
            return o.id_equipamento === eqId &&
                   o.tipo === 'preventiva' &&
                   (o.status_os === 'aberta' || o.status_os === 'em_execucao');
        });

        if (os) {
            // Patch na URL: ?eq=X → ?os=Y sem reload
            var url = new URL(window.location.href);
            url.searchParams.set('os', os.id_os);
            url.searchParams.delete('eq');
            window.history.replaceState({}, '', url.toString());
        } else {
            // Sinaliza para o post-script (registrado depois do manutencao-preventiva.js)
            // sobrescrever a mensagem de erro padrão com uma mensagem mais clara.
            window.__semOSPreventiva = true;
        }
    }());
    </script>

    <script src="/js/api.js"></script>
    <!-- Reutiliza o JS da manutenção preventiva sem duplicação -->
    <script src="/js/manutencao-preventiva.js"></script>

    <!-- Post-script: registrado APÓS manutencao-preventiva.js, dispara por último -->
    <script>
    if (window.__semOSPreventiva) {
        document.addEventListener('DOMContentLoaded', function () {
            var infoOs = document.getElementById('info-os');
            if (infoOs) {
                infoOs.innerHTML =
                    '<span style="color:#64748b;font-size:13px;">' +
                    'Nenhuma OS preventiva aberta para este equipamento. ' +
                    '<a href="/pages/ordens-servico.html" style="color:#2155FC;">' +
                    'Ver Ordens de Servi&ccedil;o</a></span>';
            }
            // Oculta o resto do formulário
            var form = document.getElementById('form-preventiva');
            if (form) {
                Array.from(form.children).slice(1).forEach(function (el) {
                    el.style.display = 'none';
                });
            }
        });
    }
    </script>
</body>
</html>
