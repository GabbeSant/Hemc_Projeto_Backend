<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemec | Equipamentos</title>
    <link rel="stylesheet" href="/css/equipamentos.css">
    <link rel="shortcut icon" href="../Images/favicon.ico" type="image/x-icon">
</head>
<body>
     <!-- MENU -->

    <aside class="sidebar">
      <!-- Logo -->
      <img src="/images/logo.png" class="logo" alt="logo" />
      <hr>

      <!-- Menu Principal -->
      <nav class="menu-section">
        <span>PRINCIPAL</span>

        <a href="/pages/dashboard.html" class="nav-dashboard">
          <img src="/images/icone-1.png" alt="ICONE DASHBOARD" />
          <span>Dashboard</span>
        </a>

        <a href="#" class="nav-equipamentos">
          <img src="/images/icone-2.png" alt="ICONE EQUIPAMENTOS" />
          <span>Equipamentos</span>
        </a>
      </nav>

      <!-- Menu Manutenção -->
      <nav class="menu-section" class="nav-manutencao">
        <span>MANUTENÇÃO</span>

        <a href="/pages/ordens-servico.html" class="nav-ordens-servico">
          <img src="/images/icone-3.png" alt="ICONE ORDENS DE SERVIÇO" />
          <span>Ordens de Serviço</span>
        </a>

        <a href="/pages/manutencao-preventiva.html" class="nav-manut-prev">
          <img src="/images/icone-4.png" alt="ICONE MANUTENÇÃO PREVENTIVA" />
          <span>Manutenção Preventiva</span>
        </a>
      </nav>

      <!-- Footer do Usuário -->
      <div class="sidebar-footer">
        <a href="/pages/perfil.html" class="nav-perfil">
          <div class="avatar">
            <img src="/images/icone-5.png" alt="Avatar" />
            <span class="nome-paciente" id="nome-usuario">Carregando...</span>
          </div>
        </a>
        <a href="#" class="bt-navegacao" onclick="fazerLogout(event)">
          <img src="/images/icone-6.png" alt="IMAGEM DE SAIR" />
        </a>
      </div>
    </aside>


    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo-principal">
        <!--TOPO DA PÁGINA-->
        <div class="main-top">
            <span>Equipamentos</span>
            <a href="/pages/Cadastro_equipamentos.html" class="bt-novo-equipamento">Novo Equipamento</a>
        </div>


        <!-- INPUT DE BUSCA DE EQUIPAMENTOS -->
         <!-- ESPERANDO BACKEND -->
        <div class="conteiner-busca">
            <img src="/images/icone-13.png" alt="LUPA" class="icone-busca">
            <input 
             type="text" 
             id="busca-equipamento" 
             placeholder="Buscar por nome, patrimônio, modelo..."
             class="input-busca"
             />
        </div>




        <!-- TABELA DE EQUIPAMENTOS -->
         <div class="lista-equipamentos">
         <table class="tabela-equipamentos">
            <thead>
                <tr>
                <th>PATRIMÔNIO</th>
                <th>EQUIPAMENTO</th>
                <th>FABRICANTE/MODELO</th>
                <th>SETOR</th>
                <th>CRITICIDADE</th>
                <th>STATUS</th>
                <th>MANUTENÇÕES</th>
                </tr>
            </thead>

            <tbody>
                <tr><td colspan="7" style="text-align:center;padding:2rem;color:#64748b;">Carregando equipamentos...</td></tr>
            </tbody>
        </table>
    </div>

    </div>
  <script src="/js/api.js"></script>
  <script src="/js/equipamentos.js"></script>
</body>
</html>
