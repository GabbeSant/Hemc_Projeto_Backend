<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inder&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css?v=2">
    <title>Hemec | Login</title>
</head>
<body>
    <header class="navbar">
        <div class="navbar-logo">
            <img src="/Images/logo/Group 32.png" alt="logo Hemec">
        </div>
        <nav class="navbar-nav">
            <a href="/">Início</a>
            <a href="/pages/Funcionalidades.html">Funcionalidades</a>
        </nav>
        <a href="/pages/login.html" class="btn-entrar">Entrar no Sistema</a>
    </header>

    <main class="main-content">
        <div class="panel-image">
            <img src="/Images/WhatsApp Image 2026-04-16 at 15.56.33 1.png" alt="Equipamento hospitalar">
        </div>

        <div class="panel-form">
            <div class="login-card">
                <div class="login-card-header">
                    <img src="/Images/mdi_person-circle.png" alt="Usuário">
                    <h2>Login</h2>
                    <p>Acesse sua conta para continuar</p>
                </div>

                <form id="form-login">
                    <div>
                        <p class="perfil-titulo">Selecione o perfil</p>
                        <div class="perfil-container">
                            <label>
                                <input type="radio" name="perfil" value="admin">
                                <div class="card-perfil">
                                    <img src="/Images/fluent-emoji-high-contrast_wrench.png" alt="">
                                    <span>Administrador</span>
                                </div>
                            </label>
                            <label>
                                <input type="radio" name="perfil" value="tecnico">
                                <div class="card-perfil">
                                    <img src="/Images/lucide_hammer.png" alt="">
                                    <span>Técnico</span>
                                </div>
                            </label>
                            <label>
                                <input type="radio" name="perfil" value="enfermeira">
                                <div class="card-perfil">
                                    <img src="/Images/flowbite_clipboard-outline.png" alt="">
                                    <span>Enfermeira</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="input-nome">Nome de usuário</label>
                        <div class="input-wrapper">
                            <img src="/Images/f7_person-2.png" alt="">
                            <input type="text" id="input-nome" placeholder="Digite seu nome completo" autocomplete="username">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="input-senha">Digite sua senha</label>
                        <div class="input-wrapper">
                            <img src="/Images/carbon_locked.png" alt="">
                            <input type="password" id="input-senha" placeholder="Senha" autocomplete="current-password">
                        </div>
                    </div>

                    <div id="msg-erro" style="display:none; color:#dc2626; font-size:13px; text-align:center; padding:8px 0;"></div>

                    <button class="btn-submit" type="submit">Entrar no sistema</button>
                </form>

                <div class="divider">
                    <hr>
                    <span>Ou</span>
                    <hr>
                </div>

                <div class="form-footer">
                    <p>Não possui uma conta?</p>
                    <a href="/pages/Cadastro.html">Cadastre-se</a>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/login.js"></script>
</body>
</html>
