<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hemec | Cadastro de Equipamento</title>
    <link rel="stylesheet" href="/css/Cadastro_equipamentos.css">
    <link rel="shortcut icon" href="../Images/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- MENU LATERAL -->
    <aside class="sidebar">
        <img src="/images/logo.png" class="logo" alt="logo" />
        <hr>

        <nav class="menu-section">
            <span>PRINCIPAL</span>
            <a href="/pages/dashboard.html">
                <img src="/images/icone-1.png" alt="ICONE DASHBOARD" />
                <span>Dashboard</span>
            </a>
            <a href="/pages/equipamentos.html" class="nav-equipamentos">
                <img src="/images/icone-2.png" alt="ICONE EQUIPAMENTOS" />
                <span>Equipamentos</span>
            </a>
        </nav>

        <nav class="menu-section">
            <span>MANUTENÇÃO</span>
            <a href="/pages/ordens-servico.html">
                <img src="/images/icone-3.png" alt="ICONE ORDENS DE SERVIÇO" />
                <span>Ordens de Serviço</span>
            </a>
            <a href="/pages/manutencao-preventiva.html">
                <img src="/images/icone-4.png" alt="ICONE MANUTENÇÃO PREVENTIVA" />
                <span>Manutenção Preventiva</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/pages/perfil.html" class="nav-perfil">
                <div class="avatar">
                    <img src="/images/icone-5.png" alt="Avatar" />
                    <span class="nome-paciente">Rafaela Lima</span>
                </div>
            </a>
            <a href="#" class="bt-navegacao" onclick="fazerLogout(event)">
                <img src="/images/icone-6.png" alt="Sair" />
            </a>
        </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo-principal">
        <div class="main-top">
            <span id="titulo-pagina">Cadastro de Equipamento</span>
            <a href="/pages/Cadastro_equipamentos.html" class="bt-novo-equipamento">Novo Equipamento</a>
        </div>

        <form id="form-equipamento" class="form-container">

            <!-- Identificação -->
            <div class="form-section">
                <h3 class="form-section-title">Identificação do Equipamento</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Número Patrimonial *</label>
                        <input id="num_patrimonio" type="text" placeholder="Ex: PAT-2025-001">
                    </div>
                    <div class="form-group">
                        <label>Modelo</label>
                        <input id="modelo" type="text" placeholder="Ex: VX-3000">
                    </div>
                    <div class="form-group">
                        <label>Número de Série</label>
                        <input id="num_serie" type="text" placeholder="Ex: SN-2025-001">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Equipamento *</label>
                        <select id="id_tipo">
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Fabricante *</label>
                        <select id="id_fabricante">
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Setor *</label>
                        <select id="id_setor">
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Data de Aquisição</label>
                        <input id="data_aquisicao" type="date">
                    </div>
                    <div class="form-group">
                        <label>Valor de Aquisição (R$)</label>
                        <input id="valor_aquisicao" type="number" min="0" step="0.01" placeholder="Ex: 12500.00">
                    </div>
                </div>
            </div>

            <!-- Criticidade -->
            <div class="form-section">
                <h3 class="form-section-title">Criticidade *</h3>
                <div class="cards-radio">
                    <label class="radio-card">
                        <input type="radio" name="criticidade" value="A">
                        <div class="radio-card-content vermelho">
                            <span class="badge-letra">A</span>
                            <span class="card-titulo">Alta criticidade</span>
                            <span class="card-desc">Risco de vida imediato</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="criticidade" value="B">
                        <div class="radio-card-content amarelo">
                            <span class="badge-letra">B</span>
                            <span class="card-titulo">Média criticidade</span>
                            <span class="card-desc">Impacto assistencial indireto</span>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="criticidade" value="C">
                        <div class="radio-card-content azul">
                            <span class="badge-letra">C</span>
                            <span class="card-titulo">Baixa criticidade</span>
                            <span class="card-desc">Sem risco direto ao paciente</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Frequência -->
            <div class="form-section">
                <h3 class="form-section-title">Frequência de Manutenção Preventiva *</h3>
                <div class="frequency-grid">
                    <label class="radio-freq">
                        <input type="radio" name="frequencia" value="mensal">
                        <div class="freq-card">Mensal</div>
                    </label>
                    <label class="radio-freq">
                        <input type="radio" name="frequencia" value="trimestral">
                        <div class="freq-card">Trimestral</div>
                    </label>
                </div>
            </div>

            <!-- Ações -->
            <div class="form-actions">
                <a href="/pages/equipamentos.html" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-salvar">Salvar Equipamento</button>
            </div>

        </form>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/cadastro-equipamentos.js"></script>
</body>
</html>
